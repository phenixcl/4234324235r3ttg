name: Build foo_yandex_music
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download foobar2000 SDK
        run: |
          curl -L -o sdk.7z https://www.foobar2000.org/downloads/SDK-2025-03-07.7z
          7z x sdk.7z -oC:\foobar2000-sdk

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Prepare dependencies
        run: |
          # Ставим WTL через встроенный менеджер
          vcpkg install wtl:x86-windows
          vcpkg integrate install

          # Качаем json.hpp сразу в системную папку инклудов vcpkg, чтобы студия нашла её через угловые скобки
          New-Item -Path C:\vcpkg\installed\x86-windows\include\nlohmann -ItemType Directory -Force
          curl -L -o C:\vcpkg\installed\x86-windows\include\nlohmann\json.hpp https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp

      - name: Hijack foo_sample and build
        run: |
          # Инжектим stdafx.h для поддержки PCH студии
          $main_code = Get-Content main.cpp -Raw
          "#include `"stdafx.h`"`r`n" + $main_code | Set-Content C:\foobar2000-sdk\foobar2000\foo_sample\main.cpp
          Copy-Item yandex_api.hpp C:\foobar2000-sdk\foobar2000\foo_sample\yandex_api.hpp -Force
          
          # Собираем (Target=v145)
          cd C:\foobar2000-sdk\foobar2000\foo_sample
          msbuild foo_sample.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:TargetName=foo_yandex_music /p:PlatformToolset=v145 /p:WindowsTargetPlatformVersion=10.0 /p:UseEnv=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foo_yandex_music
          path: C:\foobar2000-sdk\foobar2000\**\foo_yandex_music.dll
