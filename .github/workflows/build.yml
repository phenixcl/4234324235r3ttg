- name: Download foobar2000 SDK
    run: |
      curl -o sdk.7z https://www.foobar2000.org/files/SDK-2023-09-21.7z
      7z x sdk.7z -oC:\foobar2000-sdk
      
  - name: Install JSON library
    run: vcpkg install nlohmann-json:x86-windows

  - name: Build plugin
    run: |
      cmake -B build -A Win32 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
      cmake --build build --config Release

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: foo_yandex_music
      path: build/Release/foo_yandex_music.dll
